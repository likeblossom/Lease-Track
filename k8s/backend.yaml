apiVersion: v1
kind: Service
metadata:
  name: lease-track-backend
  namespace: lease-track
  labels:
    app.kubernetes.io/name: lease-track-backend
spec:
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    app.kubernetes.io/name: lease-track-backend
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lease-track-backend-storage
  namespace: lease-track
  labels:
    app.kubernetes.io/name: lease-track-backend
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lease-track-backend
  namespace: lease-track
  labels:
    app.kubernetes.io/name: lease-track-backend
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: lease-track-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lease-track-backend
    spec:
      imagePullSecrets:
        - name: registry-creds
      containers:
        - name: backend
          image: ghcr.io/example/lease-track-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: lease-track-config
            - secretRef:
                name: lease-track-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 25
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: backend-storage
              mountPath: /app/data
      volumes:
        - name: backend-storage
          persistentVolumeClaim:
            claimName: lease-track-backend-storage
