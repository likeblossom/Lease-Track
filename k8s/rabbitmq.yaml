# Local/dev RabbitMQ example. In real production, prefer managed messaging or
# an operator-managed RabbitMQ cluster with backups, monitoring, and TLS.
apiVersion: v1
kind: Service
metadata:
  name: lease-track-rabbitmq
  namespace: lease-track
  labels:
    app.kubernetes.io/name: lease-track-rabbitmq
spec:
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
  selector:
    app.kubernetes.io/name: lease-track-rabbitmq
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: lease-track-rabbitmq
  namespace: lease-track
  labels:
    app.kubernetes.io/name: lease-track-rabbitmq
spec:
  serviceName: lease-track-rabbitmq
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lease-track-rabbitmq
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lease-track-rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: amqp
              containerPort: 5672
            - name: management
              containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: lease-track-secrets
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: lease-track-secrets
                  key: RABBITMQ_DEFAULT_PASS
          readinessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - -q
                - ping
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - -q
                - ping
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
