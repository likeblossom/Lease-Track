apiVersion: v1
kind: Service
metadata:
  name: lease-track-frontend
  namespace: lease-track
  labels:
    app.kubernetes.io/name: lease-track-frontend
spec:
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    app.kubernetes.io/name: lease-track-frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lease-track-frontend
  namespace: lease-track
  labels:
    app.kubernetes.io/name: lease-track-frontend
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: lease-track-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lease-track-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/example/lease-track-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
