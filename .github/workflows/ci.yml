name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Maven test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify Java toolchain
        run: |
          java -version
          mvn -version

      - name: Run tests
        run: mvn --batch-mode --show-version test
